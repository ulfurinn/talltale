global:
  title: Looking Glass

templates:
  encounters:
    default:
      conditions:
        fatigue_not_deadly:
          stat:
            stat: fatigue
            max: 7
            hide: true
    override_max_fatigue:
      conditions:
        fatigue_not_deadly:
          ignore: true

locations:
  the-room:
    name: The Room
    description: You are in a room with a bed.
    locations:
    - id: balcony
    encounters:
    - id: sleep
      name: Go to sleep
      description: You are feeling very tired. Why are you so tired?
      story: You can't keep your eyes open any longer.
      conditions:
        fatigue_check:
          stat:
            fatigue:
              min: 10
              hide: true
      choices:
      - id: faceless-man
        name: Dream of the faceless man
        story: What is he hiding?
        effects:
        - trials:
          - automatic: true
          pass:
          - stat_change:
              stat: fatigue
              change: -10
              no_less_than: 0
    - id: door
      name: What is behind the door?
      description: ""
      story: ""
      conditions:
        fatigue_check:
          stat:
            fatigue:
              max: 9
              hide: false
      choices:
      - id: leave
        name: Leave the room
        effects:
        - trials:
          - automatic: true
          pass:
          - redirect:
              location: outside
      - id: stay
        name: Stay a bit longer
        effects:
        - trials:
          - automatic: true
          pass:
          - stat_change:
              stat: fatigue
              change: 3
              no_more_than: 10
  balcony:
    name: The Balcony
  outside:
    name: Outside
    description: You are free.

player_seed:
  stats:
    fatigue: 10
  location: the-room

stats:
  fatigue:
    name: Fatigue
